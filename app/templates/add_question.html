{% extends "base.html" %}

{% block content %}

<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>
</head>
<body>

<h2>Add Question</h2>

<form method="post" action="/questions/add">

<p>
    <label>Question Number</label><br>
    <input type="text" name="question_number" required>
</p>

<p>
    <label>Question Text</label><br>
    <textarea name="question_text" rows="5" cols="50" required></textarea>
</p>

<p>
    <label>Maximum Marks</label><br>
    <input type="number" name="max_marks" required>
</p>

<p>
    <label>Assessment</label><br>
    <select name="assessment_id" required>
        <option value="">Select Assessment</option>

        {% for assessment in assessments %}
        <option value="{{ assessment.id }}">
            {{ assessment.assessment_name }}
        </option>
        {% endfor %}

    </select>
</p>

<button type="submit">Save Question</button>
<a href="/questions">Cancel</a>

</form>

</body>
</html>
{% endblock %}
