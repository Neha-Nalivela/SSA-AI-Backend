{% extends "base.html" %}

{% block content %}

<h2>Edit Faculty</h2>

<form method="post" action="/faculty/edit/{{ faculty.id }}">

    <label>Employee ID</label><br>
    <input type="text" name="employee_id" value="{{ faculty.employee_id }}" required><br><br>

    <label>Name</label><br>
    <input type="text" name="name" value="{{ faculty.name }}" required><br><br>

    <label>Email</label><br>
    <input type="email" name="email" value="{{ faculty.email }}" required><br><br>

    <label>Phone</label><br>
    <input type="text" name="phone" value="{{ faculty.phone }}"><br><br>

    <label>Designation</label><br>
    <input type="text" name="designation" value="{{ faculty.designation }}"><br><br>

    <label>Qualification</label><br>
    <input type="text" name="qualification" value="{{ faculty.qualification }}"><br><br>

    <label>Specialization</label><br>
    <input type="text" name="specialization" value="{{ faculty.specialization }}"><br><br>

    <label>Department ID</label><br>
    <input type="number" name="department_id" value="{{ faculty.department_id }}" required><br><br>

    <button type="submit">Update Faculty</button>
    <a href="/faculty">Cancel</a>

</form>

{% endblock %}
