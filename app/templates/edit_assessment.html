<form method="post" action="/assessments/edit/{{ assessment.id }}">

<input type="text"
       name="assessment_name"
       value="{{ assessment.assessment_name }}" required>

<input type="text"
       name="assessment_type"
       value="{{ assessment.assessment_type }}" required>

<input type="number"
       name="max_marks"
       value="{{ assessment.max_marks }}" required>

<input type="date"
       name="exam_date"
       value="{{ assessment.exam_date }}" required>

<input type="text"
       name="academic_year"
       value="{{ assessment.academic_year }}" required>

<input type="number"
       name="semester"
       value="{{ assessment.semester }}" required>

<select name="subject_id" required>
    {% for subject in subjects %}
    <option value="{{ subject.id }}"
        {% if subject.id == assessment.subject_id %}selected{% endif %}>
        {{ subject.subject_name }}
    </option>
    {% endfor %}
</select>

<button type="submit">Update</button>
<a href="/assessments">Cancel</a>

</form>
