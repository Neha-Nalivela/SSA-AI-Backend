<!DOCTYPE html>
<html>
<head>
    <title>Marks</title>
</head>
<body>

<h2>Marks</h2>

<a href="/marks/add">Add Marks</a>

<br><br>

<table border="1" cellpadding="8">

<tr>
    <th>ID</th>
    <th>Student ID</th>
    <th>Assessment ID</th>
    <th>Question ID</th>
    <th>Marks</th>
    <th>Actions</th>
</tr>

{% for mark in marks %}

<tr>

    <td>{{ mark.id }}</td>

    <td>{{ mark.student_id }}</td>

    <td>{{ mark.assessment_id }}</td>

    <td>{{ mark.question_id }}</td>

    <td>{{ mark.marks_obtained }}</td>

    <td>
        <a href="/marks/edit/{{ mark.id }}">Edit</a>
        |
        <a href="/marks/delete/{{ mark.id }}">Delete</a>
    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
