{% extends "base.html" %}

{% block content %}

<h2>Edit Student</h2>

<form action="/students/edit/{{ student.id }}" method="post">

    <label>Roll Number</label><br>
    <input type="text" name="roll_number" value="{{ student.roll_number }}" required><br><br>

    <label>Name</label><br>
    <input type="text" name="name" value="{{ student.name }}" required><br><br>

    <label>Email</label><br>
    <input type="email" name="email" value="{{ student.email }}" required><br><br>

    <label>Phone</label><br>
    <input type="text" name="phone" value="{{ student.phone }}"><br><br>

    <label>Gender</label><br>
    <select name="gender">
        <option value="Male" {% if student.gender == "Male" %}selected{% endif %}>Male</option>
        <option value="Female" {% if student.gender == "Female" %}selected{% endif %}>Female</option>
    </select><br><br>

    <label>Year</label><br>
    <input type="number" name="year" value="{{ student.year }}" required><br><br>

    <label>Semester</label><br>
    <input type="number" name="semester" value="{{ student.semester }}" required><br><br>

    <label>CGPA</label><br>
    <input type="number" step="0.01" name="cgpa" value="{{ student.cgpa }}"><br><br>

    <label>Attendance</label><br>
    <input type="number" step="0.01" name="attendance" value="{{ student.attendance }}"><br><br>

    <label>Department</label><br>
    <select name="department_id">
        {% for department in departments %}
        <option value="{{ department.id }}"
            {% if department.id == student.department_id %}selected{% endif %}>
            {{ department.name }}
        </option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Update Student</button>
    <a href="/students">Cancel</a>

</form>

{% endblock %}
