<!DOCTYPE html>
<html>
<head>
    <title>SSA-AI Dashboard</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

    <h2>SSA-AI Dashboard</h2>

    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5>Total Students</h5>
                    <h2>{{ students }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5>Total Subjects</h5>
                    <h2>{{ subjects }}</h2>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
