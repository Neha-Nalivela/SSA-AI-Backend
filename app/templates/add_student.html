{% extends "base.html" %}

{% block content %}

<h2>Add Student</h2>

<form action="/students/add" method="post">

    <label>Roll Number</label><br>
    <input type="text" name="roll_number" required><br><br>

    <label>Name</label><br>
    <input type="text" name="name" required><br><br>

    <label>Email</label><br>
    <input type="email" name="email" required><br><br>

    <label>Phone</label><br>
    <input type="text" name="phone"><br><br>

    <label>Gender</label><br>
    <select name="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
    </select><br><br>

    <label>Year</label><br>
    <input type="number" name="year" min="1" max="4" required><br><br>

    <label>Semester</label><br>
    <input type="number" name="semester" min="1" max="8" required><br><br>

    <label>CGPA</label><br>
    <input type="number" step="0.01" name="cgpa" value="0.00"><br><br>

    <label>Attendance (%)</label><br>
    <input type="number" step="0.01" name="attendance" value="0.00"><br><br>

    <label>Department</label><br>
    <select name="department_id">
        {% for department in departments %}
        <option value="{{ department.id }}">
            {{ department.name }}
        </option>
        {% endfor %}
    </select>

    <br><br>

    <button type="submit">Save Student</button>

</form>

{% endblock %}
